name = "cloudflare-demo-web"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"

[vars]
NEXT_PUBLIC_API_URL = "https://cloudflare-demo-api.nickycho.workers.dev"
NEXT_PUBLIC_REALTIME_URL = "wss://cloudflare-demo-realtime.nickycho.workers.dev"

# Service binding：server-side SSR 直接呼叫 api worker，
# 避免同 zone Worker-to-Worker 公開 URL 子請求被 Cloudflare 擋下（error 1042）
[[services]]
binding = "API"
service = "cloudflare-demo-api"
