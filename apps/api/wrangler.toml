name = "cloudflare-demo-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "e2c5f98632ce2f5974707c3b11ef5000"

[[d1_databases]]
binding = "DB"
database_name = "demo-db"
database_id = "af9bee6a-c1b5-426e-ac21-a53898ac6f38"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ebfa2cf43072448782ab7c75444ca657"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cloudflare-demo-bucket"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "video-content"

# STREAM_API_TOKEN 與 TURNSTILE_SECRET_KEY 為敏感值，用 `wrangler secret put` 設定，
# 不要放進 [vars]（deploy 時 [vars] 的空字串會覆蓋掉 secret）。
[vars]
STREAM_ACCOUNT_ID = "e2c5f98632ce2f5974707c3b11ef5000"
REALTIME_WORKER_URL = ""
AGENT_WORKER_URL = "https://cloudflare-demo-agent.nickycho.workers.dev"
