name = "cloudflare-demo-agent"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "e2c5f98632ce2f5974707c3b11ef5000"

[durable_objects]
bindings = [{ name = "VIDEO_PROCESSING_AGENT", class_name = "VideoProcessingAgent" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VideoProcessingAgent"]

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "video-content"

[[d1_databases]]
binding = "DB"
database_name = "demo-db"
database_id = "af9bee6a-c1b5-426e-ac21-a53898ac6f38"

[vars]
STREAM_ACCOUNT_ID = ""
STREAM_API_TOKEN = ""
AI_GATEWAY_URL = ""
